name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: voda_ai_homework
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d voda_ai_homework"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/voda_ai_homework
      APP_DATABASE_URL: postgres://voda_app:voda_app@localhost:5432/voda_ai_homework
      REDIS_URL: redis://localhost:6379
      MONGO_URL: mongodb://localhost:27017
      MONGO_DB: voda_ai_homework_test
      JWT_SECRET: test-secret
      PLATFORM_ADMIN_KEY: test-platform-key
      SEED_PASSWORD: password123

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
